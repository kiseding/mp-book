name: Deploy mp-book

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install web dependencies
        run: cd web && npm install

      - name: Build frontend
        run: cd web && npm run build

      - name: Prepare wrangler.toml with KV namespace
        run: |
          if [ -n "${{ secrets.KV_NAMESPACE_ID }}" ]; then
            sed -i 's|# \[\[kv_namespaces\]\]|[[kv_namespaces]]|' wrangler.toml
            sed -i 's|# binding = "CUSTOM_SOURCES"|binding = "CUSTOM_SOURCES"|' wrangler.toml
            sed -i "s|# id = \"your-kv-namespace-id\"|id = \"${{ secrets.KV_NAMESPACE_ID }}\"|" wrangler.toml
            echo "KV namespace configured: ${{ secrets.KV_NAMESPACE_ID }}"
          else
            echo "No KV_NAMESPACE_ID secret set, skipping KV namespace"
          fi

      # 先部署 Worker（新建或更新）
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 部署成功后再上传 secrets（Worker 必须先存在，否则 secret put 会失败）
      - name: Upload secrets
        run: |
          if [ -n "${{ secrets.USERNAME }}" ]; then
            echo "${{ secrets.USERNAME }}" | npx wrangler secret put USERNAME
          fi
          if [ -n "${{ secrets.PASSWORD }}" ]; then
            echo "${{ secrets.PASSWORD }}" | npx wrangler secret put PASSWORD
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
