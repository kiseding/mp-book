name = "mp-book"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 静态前端资源
[assets]
directory = "web/dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"

[vars]
NODE_ENV = "production"

# KV 命名空间（自定义书源持久化）
# 部署前执行: npx wrangler kv:namespace create "CUSTOM_SOURCES"
# 然后把生成的 id 填入下方并取消注释
# [[kv_namespaces]]
# binding = "CUSTOM_SOURCES"
# id = "your-kv-namespace-id"

# 书源配置示例（部署前请替换为你的 OPDS 源）
# OPDS_ENABLED = "true"
# OPDS_SOURCES_JSON = '[{"id":"demo","name":"示例书源","url":"https://example.com/opds","enabled":true}]'
